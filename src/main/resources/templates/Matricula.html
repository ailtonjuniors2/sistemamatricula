<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Matrícula</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bogle&family=Liter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
</head>

<body>

<div class="Matricula">
    <button class="btn-voltar" onclick="window.history.back()">←</button>
    
    <div>
        <div class="ident"> 
            <img src="https://i.pinimg.com/736x/1c/23/35/1c2335ec0a189439cddb0c8751c9144a.jpg" class="icon" alt="foto">
            <h1 class="nome"></h1>
        </div>
        
        <header>
            <h2 class="titulomat">Matrícula de aluno</h2>
        </header>
        <br><br><br>
        <div class="matricular">
            <form class="form" id="formCadastro" method="post">
                <div class="upload">
                </div>
                <br><br>
                <div class="form-container">
                    <div class="form-op">
                        <div class="labels">
                            <label for="name">Nome</label>
                            <input type="text" id="name" name="nome" placeholder="Nome e sobrenome" minlength="15" maxlength="150" size="50" required>
                        </div>
                        <div class="labels">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" name="cpf" placeholder="12345678911" minlength="11" maxlength="11" size="20" required>
                        </div>
                        <div class="labels">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="antonia12@gmail.com" maxlength="256" size="50" required>
                        </div>
                        <div class="labels">
                            <label for="tel">Celular</label>
                            <input type="tel" id="tel" name="tel" placeholder="12 34567891" maxlength="11" size="20" required>
                        </div>
                        <div class="labels">
                            <label for="dat">Data de Nascimento</label>
                            <input type="date" id="dat" name="dat" size="20" required>
                        </div>
                        <div class="labels">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" name="senha" placeholder="9 caracteres" minlength="9" maxlength="9" size="20" required>
                        </div>
                        <div class="labels">
                            <label for="turma">Atribuir Turma</label>
                            <select id="turma" name="turma" required>
                                <option value="" disabled selected>Carregando turmas...</option>
                            </select>
                        </div>
                    </div>
                    <div class="btn-mat">
                        <input type="submit" class="btn-sbt" value="Cadastrar Aluno">
                    </div>
                </div>
            </form>

            <div class="form-gerenciar">
                <div class="form-container">
                    <h3 style="font-family: var(--04-); color: var(--01-); text-align: center; margin-bottom: 20px;">
                        Editar ou Apagar Aluno
                    </h3>
                    <form id="formGerenciar">
                        <div class="form-op">
                            <div class="labels">
                                <label for="select-aluno">Selecionar Aluno</label>
                                <select id="select-aluno" required onchange="preencherDadosAluno()">
                                    <option value="" disabled selected>Nenhum aluno cadastrado</option>
                                </select>
                            </div>
                            <div class="labels">
                                <label for="edit-nome">Nome</label>
                                <input type="text" id="edit-nome" required>
                            </div>
                            <div class="labels">
                                <label for="edit-cpf">CPF</label>
                                <input type="text" id="edit-cpf" readonly">
                            </div>
                            <div class="labels">
                                <label for="edit-email">Email</label>
                                <input type="email" id="edit-email" required>
                            </div>
                            <div class="labels">
                                <label for="edit-tel">Celular</label>
                                <input type="tel" id="edit-tel" required>
                            </div>
                            <div class="labels">
                                <label for="edit-dat">Data de Nascimento</label>
                                <input type="date" id="edit-dat" required>
                            </div>
                            <div class="labels">
                                <label for="edit-senha">Nova Senha</label>
                                <input type="password" id="edit-senha">
                            </div>
                        </div>
                        <div class="btn-gerenciar">
                            <button type="button" class="btn-cancelar" id="btn-cancelar-edit" onclick="limparEdicao()">Cancelar</button>
                            <button type="submit" class="btn-edit">Salvar Alterações</button>
                            <button type="button" class="btn-delete" onclick="confirmarExclusao()">Apagar Aluno</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <div id="modal-delete" class="modal">
        <div class="modal-box">
            <h4>Confirmar Exclusão</h4>
            <p>Tem certeza que deseja apagar <strong id="nome-excluir"></strong>?<br>Esta ação não pode ser desfeita.</p>
            <div class="btn-mat">
                <button class="btn-sbt" style="background: var(--03-); color: var(--01-);" onclick="fecharModal()">Cancelar</button>
                <button class="btn-sbt" style="background: var(--03-); color: var(--03-);" onclick="executarExclusao()">Apagar</button>
            </div>
        </div>
    </div>
</div>
    <script>
        function getAlunos() { return JSON.parse(localStorage.getItem('alunos_sistema') || '[]'); }
        function saveAlunos(lista) { localStorage.setItem('alunos_sistema', JSON.stringify(lista)); }

        async function carregarTurmas() {
            const select = document.getElementById('turma');
            const status = document.getElementById('turma-status');
            try {
                const res = await fetch('http://localhost:8080/turmas');
                if(!res.ok) throw new Error('HTTP '+res.status);
                const turmas = await res.json();
                select.innerHTML = '<option value="" disabled selected>Selecione uma turma</option>';
                if(!turmas.length) { select.innerHTML = '<option value="" disabled>Nenhuma turma</option>'; return; }
                turmas.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id; opt.textContent = `${t.materia} - Prof. ${t.professor}`;
                    select.appendChild(opt);
                });
                if(status) { status.textContent = `${turmas.length} turma(s)`; status.style.color = '#10b981'; }
            } catch(e) {
                console.warn('Turmas offline (usando fallback)');
                select.innerHTML = '<option value="" disabled selected>Backend offline</option>';
                if(status) { status.textContent = 'Modo local ativado'; status.style.color = '#f59e0b'; }
            }
        }

        function carregarSelectAlunos() {
            const select = document.getElementById('select-aluno');
            const alunos = getAlunos();
            select.innerHTML = '<option value="" disabled selected>Selecione um aluno</option>';
            if(!alunos.length) {
                select.innerHTML = '<option value="" disabled>Nenhum aluno cadastrado</option>';
                return;
            }
            alunos.forEach((a, idx) => {
                const opt = document.createElement('option');
                opt.value = idx; opt.textContent = a.nome;
                select.appendChild(opt);
            });
        }

        function preencherDadosAluno() {
            const idx = document.getElementById('select-aluno').value;
            if(idx === '') { limparEdicao(); return; }
            const a = getAlunos()[idx];
            document.getElementById('edit-nome').value = a.nome;
            document.getElementById('edit-cpf').value = a.cpf;
            document.getElementById('edit-email').value = a.email;
            document.getElementById('edit-tel').value = a.tel;
            document.getElementById('edit-dat').value = a.dat;
            document.getElementById('edit-senha').value = '';
            document.getElementById('btn-cancelar-edit').style.display = 'inline-block';
        }

        function limparEdicao() {
            document.getElementById('select-aluno').value = '';
            ['edit-nome','edit-cpf','edit-email','edit-tel','edit-dat','edit-senha'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('btn-cancelar-edit').style.display = 'none';
        }

        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            const novo = {
                nome: document.getElementById('name').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                tel: document.getElementById('tel').value,
                dat: document.getElementById('dat').value,
                turma: document.getElementById('turma').value
            };
            const lista = getAlunos();
            lista.push(novo);
            saveAlunos(lista);
            alert('Aluno cadastrado!');
            this.reset();
            carregarSelectAlunos();
        });

        document.getElementById('formGerenciar').addEventListener('submit', function(e) {
            e.preventDefault();
            const idx = document.getElementById('select-aluno').value;
            if(idx === '') { alert('Selecione um aluno primeiro.'); return; }
            const lista = getAlunos();
            lista[idx] = {
                nome: document.getElementById('edit-nome').value,
                cpf: lista[idx].cpf,
                email: document.getElementById('edit-email').value,
                tel: document.getElementById('edit-tel').value,
                dat: document.getElementById('edit-dat').value,
                turma: lista[idx].turma
            };
            const novaSenha = document.getElementById('edit-senha').value;
            if(novaSenha) lista[idx].senha = novaSenha;
            
            saveAlunos(lista);
            alert('Alterações salvas!');
            limparEdicao();
            carregarSelectAlunos();
        });

        function confirmarExclusao() {
            const idx = document.getElementById('select-aluno').value;
            if(idx === '') { alert('Selecione um aluno primeiro.'); return; }
            document.getElementById('nome-excluir').textContent = getAlunos()[idx].nome;
            document.getElementById('modal-delete').classList.add('ativo');
        }
        function fecharModal() { document.getElementById('modal-delete').classList.remove('ativo'); }
        function executarExclusao() {
            const idx = document.getElementById('select-aluno').value;
            const lista = getAlunos();
            lista.splice(idx, 1);
            saveAlunos(lista);
            alert('Aluno removido!');
            fecharModal();
            limparEdicao();
            carregarSelectAlunos();
        }
        document.getElementById('modal-delete').addEventListener('click', function(e){ if(e.target===this) fecharModal(); });

        document.addEventListener('DOMContentLoaded', () => {
            carregarTurmas();
            carregarSelectAlunos();
        });
    </script>
</body>
</html>
