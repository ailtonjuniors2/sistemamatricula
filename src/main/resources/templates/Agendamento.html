<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bogle&family=Liter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/Style.css">
</head>
<body>
    <button class="btn-voltar" onclick="window.history.back()">←</button>
    
    <div class="container-agendamento">
        <div class="header-page">
            <h2>Agendamento</h2>
        </div>

        <form class="form-agendamento" action="#" method="post">
            <div class="campo-form">
                <label for="para-quem">Para quem é o agendamento</label>
                <select id="para-quem" name="para_quem" required>
                    <option value="" disabled selected>Selecione...</option>
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                    <option value="responsavel">Responsável</option>
                    <option value="outro">Outro</option>
                </select>
            </div>

            <div class="campo-form">
                <label for="motivo">O motivo do agendamento</label>
                <input type="text" id="motivo" name="motivo" placeholder="Digite o motivo do agendamento" required>
            </div>

            <div class="campo-form">
                <label for="descricao">Descrição do problema</label>
                <textarea id="descricao" name="descricao" placeholder="Descreva detalhadamente o problema ou necessidade..." required></textarea>
            </div>

            <button type="submit" class="btn-agendar">Agendar</button>
        </form>
    </div>
</body>
</html>
